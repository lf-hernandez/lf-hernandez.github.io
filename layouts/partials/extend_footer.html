{{ if .Page.Store.Get "hasMermaid" }}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10.9.6/dist/mermaid.esm.min.mjs';

  const diagrams = document.querySelectorAll('pre.mermaid');
  diagrams.forEach((el) => { el.dataset.source = el.textContent; });

  const isDark = () => {
    const theme = document.documentElement.dataset.theme;
    if (theme === 'dark' || theme === 'light') return theme === 'dark';
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  };

  const render = () => {
    diagrams.forEach((el) => {
      el.removeAttribute('data-processed');
      el.textContent = el.dataset.source;
    });
    mermaid.initialize({ startOnLoad: false, theme: isDark() ? 'dark' : 'default' });
    mermaid.run({ nodes: diagrams });
  };

  render();
  document.getElementById('theme-toggle')?.addEventListener('click', render);
</script>
{{ end }}
