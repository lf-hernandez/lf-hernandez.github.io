baseURL: https://lfhernandez.com
title: LFH
theme: PaperMod
copyright: "© [Luis Felipe Hernandez](https://github.com/lf-hernandez)"

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

taxonomies:
  category: categories
  tag: tags
  series: series

enableEmoji: true
enableInlineShortcodes: true
enableRobotsTXT: true
enableGitInfo: true

buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

languages:
  en:
    locale: en-us
    label: English
    weight: 1
    title: LFH
    params:
      homeInfoParams:
        Title: "Hi, I'm Felipe \U0001F44B"
        Content: "Welcome to my corner of the web! I'm a Software Engineer and author this blog."
    menu:
      main:
        - identifier: about
          name: About
          url: /about/
          weight: 5
        - identifier: blog
          name: Blog
          url: /posts/
          weight: 10
        - identifier: search
          name: Search
          url: /search/
          weight: 20
        - identifier: categories
          name: Categories
          url: /categories/
          weight: 30
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 40
        - identifier: archives
          name: Archives
          url: /archives/
          weight: 50

  es:
    locale: es-co
    label: Español
    weight: 2
    title: LFH
    params:
      homeInfoParams:
        Title: "Hola, soy Felipe \U0001F44B"
        Content: "Bienvenido a mi rincón de la web! Soy ingeniero de software y autor de este blog."
    menu:
      main:
        - identifier: about
          name: Sobre mí
          url: /es/about/
          weight: 5
        - identifier: blog
          name: Blog
          url: /es/posts/
          weight: 10
        - identifier: search
          name: Buscar
          url: /es/search/
          weight: 20
        - identifier: categories
          name: Categorías
          url: /es/categories/
          weight: 30
        - identifier: tags
          name: Etiquetas
          url: /es/tags/
          weight: 40
        - identifier: archives
          name: Archivo
          url: /es/archives/
          weight: 50

params:
  env: production
  description: "Felipe's corner of the web"
  author: felipe
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  comments: true
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true

  socialIcons:
    - name: github
      url: "https://github.com/lf-hernandez"
    - name: linkedin
      url: "https://www.linkedin.com/in/lf-hernandez/"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

services:
  googleAnalytics:
    id: "G-QVGGZQW02H"
