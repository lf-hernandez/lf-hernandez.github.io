name: Check Links

on:
  push:
    branches:
      - main
  schedule:
    # Weekly on Monday at 08:00 UTC to catch externally broken links
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HUGO_VERSION: 0.160.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          TZ: America/Los_Angeles
        run: hugo --gc --minify --baseURL "https://lfhernandez.com/"

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --base-url https://lfhernandez.com
            --exclude-loopback
            --exclude "^https://www\.linkedin\.com"
            --exclude "apple-touch-icon"
            --exclude "favicon"
            --exclude "safari-pinned-tab"
            --exclude "^https://reddit\.com/submit"
            --exclude "^https://news\.ycombinator\.com/submitlink"
            --timeout 20
            --retry-wait-time 5
            --max-retries 3
            ./public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
