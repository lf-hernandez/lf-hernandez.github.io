name: Spell Check

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
      - "cspell.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install spellcheck dictionaries
        run: npm ci --no-audit --no-fund

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          files: "content/**/*.md"
          config: cspell.json
          strict: true
          inline: warning
