name: Spell Check

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
      - "cspell.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: "content/**/*.md"
          config: cspell.json
          strict: true
          inline: warning
